name: SecurePipeline Hub - Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-app:
    name: Test Vulnerable Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          cd src
          pip install -r src_requirements.txt

      - name: Verify tools
        run: |
          echo "Python: $(python --version)"
          echo "Docker: $(docker --version)"

  semgrep-scan:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep scan
        run: |
          semgrep --config=auto --json --output=semgrep-results.json ./src || true
          echo "Semgrep scan completed"
        continue-on-error: true

      - name: Check results file
        if: always()
        run: |
          if [ -f semgrep-results.json ]; then
            echo "Results file found"
            echo "File size: $(wc -c < semgrep-results.json) bytes"
            FINDINGS=$(python3 -c "import json; print(len(json.load(open('semgrep-results.json')).get('results', [])))" 2>/dev/null || echo "0")
            echo "Total findings: $FINDINGS"
          else
            echo "Warning: semgrep-results.json not found, creating empty one"
            echo '{"results": [], "errors": []}' > semgrep-results.json
          fi

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 30

  gitleaks-scan:
    name: GitLeaks Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download GitLeaks binary
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          chmod +x gitleaks
          echo "✅ GitLeaks downloaded: $(./gitleaks version)"

      - name: Run GitLeaks scan
        run: |
          ./gitleaks detect \
            --source=. \
            --config=scanners/gitleaks.toml \
            --report-format=json \
            --report-path=gitleaks-results.json \
            --exit-code=0
          echo "✅ GitLeaks scan completed"

      - name: Check secrets found
        if: always()
        run: |
          if [ -f gitleaks-results.json ]; then
            COUNT=$(python3 -c "import json; data=json.load(open('gitleaks-results.json')); print(len(data) if isinstance(data, list) else 0)" 2>/dev/null || echo "0")
            echo "🔑 Secrets found: $COUNT"
            echo "Expected: 3 (API_KEY, DATABASE_PASSWORD, AWS_SECRET)"
          else
            echo "⚠️ No results file found"
            echo "[]" > gitleaks-results.json
          fi

      - name: Upload GitLeaks results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: gitleaks-results.json
          retention-days: 30

  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install pip-audit
        run: |
          pip install pip-audit
          echo "✅ pip-audit installed: $(pip-audit --version)"

      - name: Install vulnerable packages
        run: |
          cd src
          pip install -r src_requirements.txt
          echo "✅ Packages installed"

      - name: Run pip-audit scan
        run: |
          pip-audit --format json --output dependency-check-report.json || true
          echo "✅ pip-audit scan completed"

      - name: Check results
        if: always()
        run: |
          if [ -f dependency-check-report.json ]; then
            echo "✅ Results file found"
            cat dependency-check-report.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print('Raw structure:', type(data))
          if isinstance(data, list):
            vulns = [item for item in data if item.get('vulns')]
            print(f'Vulnerable packages: {len(vulns)}')
            for item in vulns:
              print(f'  - {item[\"name\"]}=={item[\"version\"]}: {[v[\"id\"] for v in item[\"vulns\"]]}')
          elif isinstance(data, dict):
            print('Keys:', list(data.keys()))
          "
          else
            echo "⚠️ No results file"
            echo '[]' > dependency-check-report.json
          fi

      - name: Upload dependency scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-results
          path: dependency-check-report.json
          retention-days: 30

  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t securepipeline-app:latest ./src
          echo "✅ Docker image built successfully"

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: securepipeline-app:latest
          format: json
          output: trivy-results.json
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Check results
        if: always()
        run: |
          if [ -f trivy-results.json ]; then
            echo "✅ Results file found"
            VULNS=$(python3 -c "
          import json
          data = json.load(open('trivy-results.json'))
          results = data.get('Results', [])
          total = sum(len(r.get('Vulnerabilities', []) or []) for r in results)
          print(total)
          " 2>/dev/null || echo "0")
            echo "🐳 Container vulnerabilities found: $VULNS"
          else
            echo "⚠️ No results file, creating empty one"
            echo '{"Results":[]}' > trivy-results.json
          fi

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 30

  zap-scan:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install app dependencies
        run: |
          cd src
          pip install -r src_requirements.txt
          echo "✅ Dependencies installed"

      - name: Start vulnerable app
        run: |
          cd src
          nohup python app.py > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid
          echo "App PID: $(cat /tmp/app.pid)"

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app to start..."
          for i in {1..30}; do
            if curl -s http://localhost:5000 > /dev/null 2>&1; then
              echo "✅ App is ready after ${i} seconds"
              break
            fi
            echo "Attempt $i: App not ready yet, waiting..."
            sleep 2
          done
          echo "--- App startup log ---"
          cat /tmp/app.log || true
          echo "--- Testing endpoints ---"
          curl -v http://localhost:5000/ || true
          curl -v "http://localhost:5000/search?name=test" || true
          curl -v "http://localhost:5000/greet?user=test" || true

      - name: Run OWASP ZAP scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://localhost:5000
          cmd_options: -l WARN
        continue-on-error: true

      - name: Process ZAP results
        if: always()
        run: |
          if [ -f report_json.json ]; then
            echo "✅ Found report_json.json"
            cp report_json.json zap-results.json
            ALERTS=$(python3 -c "
          import json
          data = json.load(open('zap-results.json'))
          sites = data.get('site', [])
          total = sum(len(s.get('alerts', [])) for s in sites)
          print(total)
          " 2>/dev/null || echo "0")
            echo "🌐 ZAP alerts found: $ALERTS"
          else
            echo "⚠️ report_json.json not found"
            echo '{"site":[]}' > zap-results.json
          fi

      - name: Show app logs
        if: always()
        run: |
          echo "--- Final app log ---"
          cat /tmp/app.log || true

      - name: Stop app
        if: always()
        run: |
          kill $(cat /tmp/app.pid) 2>/dev/null || true
          echo "✅ App stopped"

      - name: Upload ZAP results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-results
          path: zap-results.json
          retention-days: 30

  summary:
    name: Scan Summary
    needs: [test-app, semgrep-scan, gitleaks-scan, dependency-check, trivy-scan, zap-scan]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download Semgrep results
        uses: actions/download-artifact@v4
        with:
          name: semgrep-results
        continue-on-error: true

      - name: Download GitLeaks results
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-results
        continue-on-error: true

      - name: Download Dependency-Check results
        uses: actions/download-artifact@v4
        with:
          name: dependency-check-results
        continue-on-error: true

      - name: Download Trivy results
        uses: actions/download-artifact@v4
        with:
          name: trivy-results
        continue-on-error: true

      - name: Download ZAP results
        uses: actions/download-artifact@v4
        with:
          name: zap-results
        continue-on-error: true

      - name: Generate Summary Report
        run: |
          echo "# 🔒 Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Type | Status | Findings |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|--------|----------|" >> $GITHUB_STEP_SUMMARY

          if [ -f semgrep-results.json ]; then
            FINDINGS=$(python3 -c "import json; print(len(json.load(open('semgrep-results.json')).get('results', [])))" 2>/dev/null || echo "0")
            echo "| Semgrep | SAST | ✅ Complete | $FINDINGS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Semgrep | SAST | ⚠️ No results | 0 |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f gitleaks-results.json ]; then
            SECRETS=$(python3 -c "import json; data=json.load(open('gitleaks-results.json')); print(len(data) if isinstance(data, list) else 0)" 2>/dev/null || echo "0")
            echo "| GitLeaks | Secrets | ✅ Complete | $SECRETS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| GitLeaks | Secrets | ⚠️ No results | 0 |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f dependency-check-report.json ]; then
            VULNS=$(python3 -c "
          import json
          data = json.load(open('dependency-check-report.json'))
          if isinstance(data, list):
            total = sum(len(item.get('vulns', [])) for item in data)
          else:
            total = 0
          print(total)
          " 2>/dev/null || echo "0")
            echo "| pip-audit (SCA) | SCA | ✅ Complete | $VULNS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| pip-audit (SCA) | SCA | ⚠️ No results | 0 |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f trivy-results.json ]; then
            VULNS=$(python3 -c "
          import json
          data = json.load(open('trivy-results.json'))
          results = data.get('Results', [])
          total = sum(len(r.get('Vulnerabilities', []) or []) for r in results)
          print(total)
          " 2>/dev/null || echo "0")
            echo "| Trivy | Container | ✅ Complete | $VULNS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Trivy | Container | ⚠️ No results | 0 |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f zap-results.json ]; then
            ALERTS=$(python3 -c "
          import json
          data = json.load(open('zap-results.json'))
          sites = data.get('site', [])
          total = sum(len(s.get('alerts', [])) for s in sites)
          print(total)
          " 2>/dev/null || echo "0")
            echo "| OWASP ZAP | DAST | ✅ Complete | $ALERTS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| OWASP ZAP | DAST | ⚠️ No results | 0 |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎯 Expected Detections" >> $GITHUB_STEP_SUMMARY
          echo "- **Semgrep**: 5 code vulnerabilities (SQLi, XSS, Path Traversal, CMDi, Debug mode)" >> $GITHUB_STEP_SUMMARY
          echo "- **GitLeaks**: 3 hardcoded secrets (API_KEY, DATABASE_PASSWORD, AWS_SECRET)" >> $GITHUB_STEP_SUMMARY
          echo "- **Dep-Check**: CVE-2023-30861 in Flask==2.0.1" >> $GITHUB_STEP_SUMMARY

  normalize:
    name: Normalize and Process Findings
    needs: [semgrep-scan, gitleaks-scan, dependency-check, trivy-scan, zap-scan]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ── Download all 5 scanner artifacts ──────────────────────────────
      - name: Download Semgrep results
        uses: actions/download-artifact@v4
        with:
          name: semgrep-results
          path: tests/sample_data
        continue-on-error: true

      - name: Download GitLeaks results
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-results
          path: tests/sample_data
        continue-on-error: true

      - name: Download Dependency-Check results
        uses: actions/download-artifact@v4
        with:
          name: dependency-check-results
          path: tests/sample_data
        continue-on-error: true

      - name: Download Trivy results
        uses: actions/download-artifact@v4
        with:
          name: trivy-results
          path: tests/sample_data
        continue-on-error: true

      - name: Download ZAP results
        uses: actions/download-artifact@v4
        with:
          name: zap-results
          path: tests/sample_data
        continue-on-error: true

      # ── Step 1: Normalizer ─────────────────────────────────────────────
      - name: Run Normalizer
        run: |
          python processing/normalizer.py
          echo "✅ Normalization complete"

      - name: Show normalization summary
        run: |
          python3 -c "
          import json
          data = json.load(open('normalized-findings.json'))
          print(f'Total findings: {len(data)}')
          by_source = {}
          by_severity = {}
          for f in data:
              by_source[f['source']] = by_source.get(f['source'], 0) + 1
              by_severity[f['severity']] = by_severity.get(f['severity'], 0) + 1
          print('By source:', by_source)
          print('By severity:', by_severity)
          "

      # ── Step 2: Risk Engine ────────────────────────────────────────────
      - name: Run Risk Engine
        run: |
          python processing/risk_engine.py
          echo "✅ Risk scoring complete"

      - name: Show risk scoring summary
        run: |
          python3 -c "
          import json
          data = json.load(open('scored-findings.json'))
          by_priority = {}
          for f in data:
              p = f.get('priority', 'UNKNOWN')
              by_priority[p] = by_priority.get(p, 0) + 1
          print(f'Total scored: {len(data)}')
          print('By priority:', by_priority)
          top5 = sorted(data, key=lambda x: x.get('risk_score', 0), reverse=True)[:5]
          print('Top 5 findings:')
          for f in top5:
              print(f'  [{f.get(\"risk_score\",0):3d}] {f.get(\"priority\",\"?\"):8s} | {f.get(\"source\",\"?\"):12s} | {f.get(\"title\",\"\")[:50]}')
          "

      # ── Step 3: Ownership Engine ───────────────────────────────────────
      - name: Run Ownership Engine
        run: |
          python processing/ownership_engine.py
          echo "✅ Ownership assignment complete"

      - name: Show ownership summary
        run: |
          python3 -c "
          import json
          data = json.load(open('owned-findings.json'))
          methods = {}
          assignees = {}
          for f in data:
              m = f.get('assignment_method', 'unknown')
              a = f.get('assignee', 'unknown')
              methods[m] = methods.get(m, 0) + 1
              assignees[a] = assignees.get(a, 0) + 1
          print(f'Total assigned: {len(data)}')
          print('By method:', methods)
          print('By assignee:', assignees)
          "

      # ── Upload final enriched findings ────────────────────────────────
      - name: Upload enriched findings
        uses: actions/upload-artifact@v4
        with:
          name: enriched-findings
          path: owned-findings.json
          retention-days: 30