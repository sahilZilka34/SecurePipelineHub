name: SecurePipeline Hub - Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-app:
    name: Test Vulnerable Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          cd src
          pip install -r src_requirements.txt

      - name: Verify tools
        run: |
          echo "Python: $(python --version)"
          echo "Docker: $(docker --version)"

  semgrep-scan:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep scan
        run: |
          semgrep --config=auto --json --output=semgrep-results.json ./src || true
          echo "Semgrep scan completed"
        continue-on-error: true

      - name: Check results file
        if: always()
        run: |
          if [ -f semgrep-results.json ]; then
            echo "Results file found"
            echo "File size: $(wc -c < semgrep-results.json) bytes"
            FINDINGS=$(python3 -c "import json; print(len(json.load(open('semgrep-results.json')).get('results', [])))" 2>/dev/null || echo "0")
            echo "Total findings: $FINDINGS"
          else
            echo "Warning: semgrep-results.json not found, creating empty one"
            echo '{"results": [], "errors": []}' > semgrep-results.json
          fi

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 30

  gitleaks-scan:
    name: GitLeaks Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download GitLeaks binary
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          chmod +x gitleaks
          echo "✅ GitLeaks downloaded: $(./gitleaks version)"

      - name: Run GitLeaks scan
        run: |
          ./gitleaks detect \
            --source=. \
            --config=scanners/gitleaks.toml \
            --report-format=json \
            --report-path=gitleaks-results.json \
            --exit-code=0
          echo "✅ GitLeaks scan completed"

      - name: Check secrets found
        if: always()
        run: |
          if [ -f gitleaks-results.json ]; then
            COUNT=$(python3 -c "import json; data=json.load(open('gitleaks-results.json')); print(len(data) if isinstance(data, list) else 0)" 2>/dev/null || echo "0")
            echo "🔑 Secrets found: $COUNT"
            echo "Expected: 3 (API_KEY, DATABASE_PASSWORD, AWS_SECRET)"
          else
            echo "⚠️ No results file found"
            echo "[]" > gitleaks-results.json
          fi

      - name: Upload GitLeaks results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: gitleaks-results.json
          retention-days: 30
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download OWASP Dependency-Check
        run: |
          wget -q https://github.com/jeremylong/DependencyCheck/releases/download/v9.0.9/dependency-check-9.0.9-release.zip
          unzip -q dependency-check-9.0.9-release.zip
          chmod +x dependency-check/bin/dependency-check.sh
          echo "✅ Dependency-Check ready"

      - name: Run Dependency-Check scan
        run: |
          ./dependency-check/bin/dependency-check.sh \
            --project "SecurePipelineHub" \
            --scan ./src \
            --format JSON \
            --out . \
            --enableRetired \
            --enableExperimental \
            --nvdApiDelay 6000 \
            --disableAssembly \
            || true
          echo "✅ Dependency-Check scan completed"

      - name: Check results
        if: always()
        run: |
          if [ -f dependency-check-report.json ]; then
            echo "✅ Results file found"
            VULNS=$(python3 -c "
          import json
          data = json.load(open('dependency-check-report.json'))
          deps = data.get('dependencies', [])
          total = sum(len(d.get('vulnerabilities', [])) for d in deps)
          print(total)
          " 2>/dev/null || echo "0")
            echo "🔍 Vulnerabilities found: $VULNS"
            echo "Expected: CVE-2023-30861 in Flask==2.0.1"
          else
            echo "⚠️ No results file, creating empty one"
            echo '{"dependencies":[]}' > dependency-check-report.json
          fi

      - name: Upload Dependency-Check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-results
          path: dependency-check-report.json
          retention-days: 30

  summary:
    name: Scan Summary
    needs: [test-app, semgrep-scan, gitleaks-scan, dependency-check]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download Semgrep results
        uses: actions/download-artifact@v4
        with:
          name: semgrep-results
        continue-on-error: true

      - name: Download GitLeaks results
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-results
        continue-on-error: true

      - name: Download Dependency-Check results
        uses: actions/download-artifact@v4
        with:
          name: dependency-check-results
        continue-on-error: true

      - name: Generate Summary Report
        run: |
          echo "# 🔒 Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Type | Status | Findings |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|--------|----------|" >> $GITHUB_STEP_SUMMARY

          if [ -f semgrep-results.json ]; then
            FINDINGS=$(python3 -c "import json; print(len(json.load(open('semgrep-results.json')).get('results', [])))" 2>/dev/null || echo "0")
            echo "| Semgrep | SAST | ✅ Complete | $FINDINGS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Semgrep | SAST | ⚠️ No results | 0 |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f gitleaks-results.json ]; then
            SECRETS=$(python3 -c "import json; data=json.load(open('gitleaks-results.json')); print(len(data) if isinstance(data, list) else 0)" 2>/dev/null || echo "0")
            echo "| GitLeaks | Secrets | ✅ Complete | $SECRETS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| GitLeaks | Secrets | ⚠️ No results | 0 |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f dependency-check-report.json ]; then
            VULNS=$(python3 -c "
          import json
          data = json.load(open('dependency-check-report.json'))
          deps = data.get('dependencies', [])
          total = sum(len(d.get('vulnerabilities', [])) for d in deps)
          print(total)
          " 2>/dev/null || echo "0")
            echo "| OWASP Dep-Check | SCA | ✅ Complete | $VULNS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| OWASP Dep-Check | SCA | ⚠️ No results | 0 |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎯 Expected Detections" >> $GITHUB_STEP_SUMMARY
          echo "- **Semgrep**: 5 code vulnerabilities (SQLi, XSS, Path Traversal, CMDi, Debug mode)" >> $GITHUB_STEP_SUMMARY
          echo "- **GitLeaks**: 3 hardcoded secrets (API_KEY, DATABASE_PASSWORD, AWS_SECRET)" >> $GITHUB_STEP_SUMMARY
          echo "- **Dep-Check**: CVE-2023-30861 in Flask==2.0.1" >> $GITHUB_STEP_SUMMARY
